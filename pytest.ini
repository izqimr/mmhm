[pytest]
# 最小 pytest 版本
minversion = 7.0

# 测试路径
testpaths = testCase

# 测试文件模式
python_files = test_*.py

# 测试类模式
python_classes = Test*

# 测试函数模式
python_functions = test_*

# 添加选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra

# 标记定义
markers =
    integration: 集成测试
    unit: 单元测试
    slow: 耗时测试
    api: API 测试
    db: 数据库相关测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置（如果使用 pytest-cov）
# --cov=api
# --cov=common
# --cov-report=html
# --cov-report=term-missing
